defaults:
  - dataset: halfcheetah_medium
  - world_model: mle
  - policy_optimizer: mopo
  - networks: mlp
  - _self_

seed: 0
stage: all
debug: true
checkpoint_dir: checkpoints
policy_checkpoint_dir: null  # set at runtime: {checkpoint_dir}/policies/{algo}-s{seed}-{timestamp}
allow_lineage_mismatch: false  # when true, eval trusts policy.pkl lineage even if checkpoint_dir points elsewhere

wandb:
  enabled: false
  entity: model-based-eggroll
  name: null    # auto-generated if null: see logger._auto_name
  tags: []      # e.g. [final, rerun, ablation]

eval:
  num_episodes: 10
  eval_workers: 8
