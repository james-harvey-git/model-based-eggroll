defaults:
  - dataset: halfcheetah_medium
  - world_model: ensemble_mlp_eggroll
  # Phase-2 config for combined backprop->trajectory fine-tuning runs. Composed into
  # its own key; only consumed when world_model.finetune=true (harmless otherwise).
  # Override Phase-2 settings under the finetune_world_model. prefix.
  - world_model@finetune_world_model: eggroll_trajectory
  - policy_optimizer: mopo
  - networks: mlp
  - _self_

seed: 0
stage: all
debug: true
checkpoint_dir: checkpoints
policy_checkpoint_dir: null  # set at runtime: {checkpoint_dir}/policies/{algo}-s{seed}-{timestamp}
allow_lineage_mismatch: false  # when true, eval trusts policy.pkl lineage even if checkpoint_dir points elsewhere

wandb:
  enabled: false
  entity: model-based-eggroll
  name: null    # auto-generated if null: see logger._auto_name
  tags: []      # e.g. [final, rerun, ablation]

eval:
  num_episodes: 10
  eval_workers: 8

wm_eval:
  # stage=wm_eval: also report open-loop rollout MSE (+ per-step curve) at this horizon.
  # 0 disables; only world-model classes with compute_traj_mse (EnsembleMLP) support it.
  traj_horizon: 5
