_target_: mbrl.policy_optimizers.mopo.train

# SAC hyperparameters (shared with sac_n module)
lr: 1e-4
batch_size: 256
gamma: 0.99
polyak_step_size: 0.005
num_critics: 10

# MOPO-specific
# Uncertainty penalty source: aleatoric (per-member predicted std), epistemic
# (cross-member disagreement of means), or auto (aleatoric if the world model has a
# logvar head, else epistemic — required for disable_logvar_predictions models).
penalty_type: auto
penalty_coeff: 0.5
rollout_length: 5
num_policy_updates: 3_000_000
rollout_interval: 1000
rollout_batch_size: 50000
model_retain_epochs: 5
dataset_sample_ratio: 0.05
eval_interval: 5000
