program: scripts/sweep_world_model.py
method: random
run_cap: 48
metric:
  name: world_model/val_mse
  goal: minimize
early_terminate:
  type: hyperband
  min_iter: 125000
  eta: 3
  s: 2
parameters:
  population_size:
    value: 4096
  group_size:
    value: 16
  weight_decay:
    value: 1e-5
  b1:
    value: 0.9
  num_epochs:
    value: 1250000
  sigma:
    distribution: log_uniform_values
    min: 0.01
    max: 0.03
  one_minus_sigma_decay_rate:
    distribution: log_uniform_values
    min: 1.0e-7
    max: 1.0e-4
  lr:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 1.0e-3
