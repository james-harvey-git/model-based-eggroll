program: scripts/sweep_world_model.py
method: random
run_cap: 16
metric:
  name: world_model/val_mse
  goal: minimize
parameters:
  population_size:
    value: 4096
  group_size:
    value: 16
  weight_decay:
    value: 1e-5
  b1:
    value: 0.9
  sigma:
    distribution: uniform
    min: 0.01
    max: 0.03
  sigma_decay_rate:
    distribution: uniform
    min: 0.99999
    max: 0.999999
  lr:
    distribution: uniform
    min: 0.0001
    max: 0.001
  num_epochs:
    value: 1250000
