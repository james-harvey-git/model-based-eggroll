program: scripts/sweep_world_model.py
method: random
run_cap: 400
metric:
  name: world_model/val_mse
  goal: minimize
parameters:
  population_size:
    value: 2048
  group_size:
    value: 8
  weight_decay:
    distribution: uniform
    min: 0.0
    max: 0.0001
  b1:
    distribution: uniform
    min: 0.9
    max: 0.95
  sigma:
    distribution: uniform
    min: 0.005
    max: 0.02
  sigma_decay_rate:
    distribution: uniform
    min: 0.99997
    max: 0.999995
  lr:
    distribution: uniform
    min: 0.0001
    max: 0.001
