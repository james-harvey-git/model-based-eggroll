_target_: mbrl.world_models.mle_dynamicsnet.MLEDynamicsNet

# Network architecture — must match the eggroll_ensemble config it hands off to.
hidden_dims: [200, 200, 200, 200]
activation: pqn
init_scheme: eggroll

# Training
num_epochs: 1000              # × (n_train // batch_size) = MLE update steps
batch_size: 256
lr: 1e-3
weight_decay: 1e-5
validation_split: 0.2
logvar_diff_coef: 0.01

# Logvar clamp init
max_logvar_init: 0.5
min_logvar_init: -10.0

# Single-network — predict_ensemble returns this many copies (zero epistemic diversity)
num_members: 1

# Populated by experiments/world_model.py from the top-level cfg.seed before train().
# Required so Stage 2 can replay this stage's train/val partition.
seed: null
