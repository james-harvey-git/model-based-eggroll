_target_: mbrl.world_models.ensemble_mlp.EnsembleMLP
trainer: eggroll

num_ensemble: 7
num_elites: 5
hidden_dims: [200, 200, 200, 200]
activation: pqn
init_scheme: eggroll
backbone: mlp                      # mlp | residual_mlp

num_epochs: 1250000
validation_split: 0.2
logvar_diff_coef: 0.01
max_logvar_init: 0.5
min_logvar_init: -10.0
log_interval: 500
full_validation_interval: 5000

# false: each member gets independent perturbation directions (init-orthogonal
# diversity backprop lacks). true: one perturbation population broadcast across
# members (init-only diversity, the backprop-aligned ablation).
use_shared_perturbations: false

eggroll:
  population_size: 2048           # per member
  group_size: 4
  solver: adamw
  solver_kwargs: {weight_decay: 1e-5, b1: 0.9}
  noise_reuse: 1
  sigma: 0.02
  sigma_decay_rate: 0.999995
  sigma_schedule: exponential     # constant | exponential | cosine | linear
  sigma_schedule_kwargs: {}
  lr: 3e-4
  lr_schedule: constant
  lr_schedule_kwargs: {}
  use_batched_update: true

init_checkpoint: null             # path to an EnsembleMLP checkpoint to fine-tune from
reset_optax_state: true
seed: null                        # set from top-level cfg.seed by experiments/world_model.py
