_target_: mbrl.world_models.ensemble_mlp.EnsembleMLP
trainer: backprop

num_ensemble: 7
num_elites: 5                     # best members by val MSE; used by predict_ensemble/step
hidden_dims: [200, 200, 200, 200]
activation: pqn
init_scheme: eggroll
backbone: mlp                     # mlp | residual_mlp

num_epochs: 400
batch_size: 256
lr: 1e-3
optimizer: adamw                  # sgd | adam | adamw
optimizer_kwargs: {eps: 1e-5, weight_decay: 2.5e-5}  # solver-specific (e.g. {momentum: 0.9} for sgd)
validation_split: 0.2
# Keep each member's best-by-holdout params (snapshotted at epoch boundaries) rather
# than its last step — the MBPO/deep-ensembles recipe. Costs one val pass per epoch.
keep_best: true
# Chunk size for full-set evaluations (val MSE, rollout curves): bounds peak memory.
eval_chunk_size: 16384
# false drops the optimiser state from the checkpoint (halves size; only fine-tunes
# with reset_optax_state=false need it).
save_opt_state: false
logvar_diff_coef: 0.01
max_logvar_init: 0.5
min_logvar_init: -10.0
# Deterministic dynamics (e.g. MuJoCo): drop the log-variance head so the model predicts
# only mean + reward. Training becomes pure MSE; uncertainty is epistemic (ensemble
# disagreement) only. MOPO must then use an epistemic penalty (penalty_type=auto/epistemic).
disable_logvar_predictions: true

# Logging cadence is measured in optimiser update steps (minibatches), not epochs,
# so val loss can be tracked sub-epoch against transitions seen.
log_interval: 100
full_validation_interval: 500
# Log the scale of MOPO's uncertainty penalty over the validation set every full validation
# (epistemic always; aleatoric when a logvar head exists), to calibrate penalty_coeff. Off by
# default (adds one elite forward pass per validation).
log_mopo_penalty_scale: false

init_checkpoint: null             # path to an EnsembleMLP checkpoint to fine-tune from
reset_optax_state: true          # carry the optimiser state across fine-tuning unless true
seed: null                        # set from top-level cfg.seed by experiments/world_model.py

# When true, run Phase-2 trajectory EGGROLL fine-tuning after this backprop pretrain,
# in one invocation, reusing the separate `finetune_world_model` (eggroll_trajectory)
# config and auto-handing off this run's checkpoint. See experiments/world_model.py.
finetune: false

# Precompute MoReL halt-penalty stats (discrepancy, min_r) into the checkpoint.
# Expensive O(N^2) one-off; enable only when this world model feeds MoReL.
precompute_term_stats: false
