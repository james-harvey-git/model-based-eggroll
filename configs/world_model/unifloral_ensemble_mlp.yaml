_target_: mbrl.world_models.unifloral_ensemble_mlp.UnifloralEnsembleMLP

# Ensemble
num_ensemble: 7
num_elites: 5

# Network architecture
n_layers: 4
layer_size: 200

# Training
num_epochs: 400
lr: 0.001
batch_size: 256
weight_decay: 2.5e-5
logvar_diff_coef: 0.01
validation_split: 0.2

# Precompute MoReL halt-penalty stats (discrepancy, min_r) into the checkpoint.
# Expensive O(N^2) one-off; enable only when this world model feeds MoReL.
precompute_term_stats: false
