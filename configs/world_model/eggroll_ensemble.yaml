_target_: mbrl.world_models.eggroll.EGGROLLEnsemble

num_members: 7
hidden_dims: [200, 200, 200, 200]
activation: pqn
init_scheme: eggroll
# Backbone: "mlp" (default flat MLP, 5 Linear layers for the dims above) or
# "residual_mlp" (pre-activation ResNet blocks; requires even-length, all-equal
# hidden_dims — 2 blocks here, 6 Linear layers, so capacity is not param-matched).
backbone: mlp
num_epochs: 1250000
validation_split: 0.2
logvar_diff_coef: 0.01
log_interval: 500
full_validation_interval: 5000

eggroll:
  population_size: 4096
  group_size: 4
  solver: adamw
  solver_kwargs: {weight_decay: 1e-5, b1: 0.9}
  noise_reuse: 1        # fresh perturbation directions each epoch
  sigma: 0.02
  sigma_decay_rate: 0.999995       # legacy shortcut: feeds the default exponential sigma_schedule
  sigma_schedule: exponential      # constant | exponential | cosine | linear
  sigma_schedule_kwargs: {}        # empty exponential => per-step decay at sigma_decay_rate (no floor)
  lr: 3e-4
  lr_schedule: constant            # constant | exponential | cosine | linear
  lr_schedule_kwargs: {}           # e.g. cosine: {decay_steps: 1250000, alpha: 0.01}
  use_batched_update: true

# Optional warm-start from a stage-1 MLEDynamicsNet checkpoint (issue #30).
# When set, params are loaded from the checkpoint and (unless reset_optax_state
# is true) the AdamW state is carried over. Validation split + seed are also
# replayed from the checkpoint so val MSE is computed on the same held-out
# transitions as stage 1.
init_checkpoint: null
reset_optax_state: false
