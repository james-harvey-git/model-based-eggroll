_target_: mbrl.world_models.eggroll.EGGROLLEnsemble

num_members: 7
hidden_dims: [256, 256]
activation: relu
num_epochs: 1000
validation_split: 0.1
log_interval: 10

eggroll:
  population_size: 256
  group_size: 32
  noise_reuse: 1        # fresh perturbation directions each epoch
  sigma: 0.01
  sigma_decay_rate: 0.997
  lr: 1.0e-3
